server:
  port: 8081

spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_auth
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    
    defer-datasource-initialization: true

    show-sql: true

    open-in-view: false

    properties:
      hibernate:
        '[format_sql]': true

  sql:
    init:
      mode: always

  data:
    redis:
      host: ${REDIS_HOST:host.docker.internal}
      port: ${REDIS_PORT:6380}

jwt:
  secret: your-super-secret-key-your-super-secret-key-123456789
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

services:
  user-service:
    url: http://localhost:8082
